<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./src/output.css">
</head>
<body>

  <!-- Header -->
  <header class="w-full bg-white border-b border-gray-100">
    <div class="container mx-auto px-6 h-16 flex items-center justify-between">
      
      <div class="text-2xl font-bold tracking-tight text-[#0F241F]">
        beauty<span class="text-[#69B99D]">salon.</span>
      </div>

      <nav class="hidden md:flex items-center space-x-8">
        <a href="#" class="text-[#69B99D] font-bold border-b-2 border-[#69B99D] pb-1">Início</a>
        <a href="#" class="text-gray-600 hover:text-[#69B99D] transition-colors">Sobre</a>
        <a href="#" class="text-gray-600 hover:text-[#69B99D] transition-colors">Serviços</a>
        <a href="#" class="text-gray-600 hover:text-[#69B99D] transition-colors">Depoimentos</a>
        <a href="#" class="text-gray-600 hover:text-[#69B99D] transition-colors">Contato</a>
      </nav>

      
      <div class="md:hidden text-[#69B99D]">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </div>

    </div>
  </header>


  <!-- Section container-->
   <section class="container mx-auto px-6 py-12 md:py-24">
    <div class="flex flex-col md:flex-row items-center justify-between gap-12">
      
      <div class="w-full md:w-1/2 text-center md:text-left order-2 md:order-1">
        <h1 class="text-3xl md:text-4xl lg:text-5xl font-bold text-[#0F241F] leading-tight mb-6">
          Saúde natural para <br> os seus cabelos
        </h1>
        <p class="text-gray-600 text-lg mb-8 max-w-md mx-auto md:mx-0">
          Um salão exclusivo em São Paulo, especializado em tratamentos naturais.
        </p>
        <a href="#" class="inline-block bg-[#69B99D] hover:bg-[#5aa38a] text-white font-medium px-8 py-4 rounded transition-colors">
          Agendar um horário
        </a>
      </div>

      <div class="w-full md:w-1/2 relative order-1 md:order-2 flex justify-center">
       
        <div class="absolute -top-6 -right-4 md:-top-10 md:-right-6 w-3/4 h-full bg-[#CCF0E3] rounded-sm -z-10"></div>
        
        
        <div class="relative overflow-hidden rounded-sm shadow-xl">
          <img 
            src="barber image.png" 
            alt="Hair Salon" 
            class="w-full h-auto object-cover max-w-[500px]"
          >
        </div>
      </div>

    </div>
  </section>
  





  
</body>
</html>
